name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --all --check
      - name: Check
        run: cargo check
      - name: Test
        run: cargo test
      - name: Clean tree
        run: git diff --exit-code && git diff --cached --exit-code
      - name: Clippy
        run: cargo clippy -- -D warnings

<svg xmlns="http://www.w3.org/2000/svg" width="720" height="180" viewBox="0 0 720 180" role="img" aria-labelledby="title desc">
  <title id="title">CompText CLI logo</title>
  <desc id="desc">CompText CLI wordmark with a context compression mark and the slogan Compress the noise, preserve the proof.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="100%" stop-color="#151A33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7CFFB2"/>
      <stop offset="52%" stop-color="#58D5FF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="720" height="180" rx="32" fill="url(#bg)"/>
  <g filter="url(#softShadow)">
    <rect x="34" y="34" width="112" height="112" rx="28" fill="#0F172A" stroke="url(#accent)" stroke-width="3"/>
    <path d="M62 66h48c14 0 24 10 24 24s-10 24-24 24H78" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
    <path d="M76 52v76" stroke="#E5E7EB" stroke-width="10" stroke-linecap="round"/>
    <path d="M57 90h62" stroke="#E5E7EB" stroke-width="10" stroke-linecap="round"/>
    <circle cx="122" cy="122" r="7" fill="#7CFFB2"/>
  </g>

  <text x="174" y="78" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="44" font-weight="800" letter-spacing="-1.2">CompText CLI</text>
  <text x="176" y="112" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="500">Models are providers. Context is the product.</text>
  <text x="176" y="141" fill="#7CFFB2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="700">Compress the noise, preserve the proof.</text>
</svg>
